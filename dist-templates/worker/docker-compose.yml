services:
  worker:
    image: spiderman/worker:${VERSION:-1.0}
    environment:
      MASTER_URL: ${MASTER_URL:?需要在 .env 设置 MASTER_URL，例如 ws://192.168.1.10:8000}
      API_KEY: ${API_KEY:?需要在 .env 设置 API_KEY（在主控 UI 添加节点时一次性显示的明文）}
      NODE_ID: ${NODE_ID:?需要在 .env 设置 NODE_ID（在主控创建时填的）}
      NODE_NAME: ${NODE_NAME:-remote-worker}
      LISTEN_PORT: ${LISTEN_PORT:-8001}
      HEARTBEAT_INTERVAL: ${HEARTBEAT_INTERVAL:-5}
      WORK_DIR: /data/work
    volumes:
      - ${DATA_ROOT:-/opt/spiderman-worker}/workerdata:/data/work
    restart: unless-stopped
