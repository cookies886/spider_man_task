name: Release (build images + push to ACR)

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (without leading v)"
        required: true
        default: "1.0"

env:
  ACR_REGISTRY: crpi-nckaq92hgnekr1fo.cn-hangzhou.personal.cr.aliyuncs.com
  ACR_NAMESPACE: cookies886
  ACR_REPO: spider_man_task
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            # tag like v1.0.3 → 1.0.3
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push master
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/Dockerfile.prod
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.ACR_REPO }}:master-${{ steps.ver.outputs.version }}
          cache-from: type=gha,scope=master
          cache-to: type=gha,mode=max,scope=master

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: frontend
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.ACR_REPO }}:frontend-${{ steps.ver.outputs.version }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Build & push worker
        uses: docker/build-push-action@v5
        with:
          context: worker
          file: worker/Dockerfile.prod
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.ACR_REPO }}:worker-${{ steps.ver.outputs.version }}
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker

      - name: Package dist-templates
        run: |
          tar -czf spiderman-dist-templates-${{ steps.ver.outputs.version }}.tar.gz \
            dist-templates/ install-spiderman.sh README.md docs/deployment.md

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: spiderman-dist-templates-${{ steps.ver.outputs.version }}.tar.gz
          generate_release_notes: true
          body: |
            ## SpiderMan v${{ steps.ver.outputs.version }}

            ### 镜像（已推送到 Aliyun ACR）

            ```
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.ACR_REPO }}:master-${{ steps.ver.outputs.version }}
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.ACR_REPO }}:frontend-${{ steps.ver.outputs.version }}
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.ACR_REPO }}:worker-${{ steps.ver.outputs.version }}
            ```

            ### 部署

            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install-spiderman.sh | bash
            ```

            支持架构：amd64 / arm64
