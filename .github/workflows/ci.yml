name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: spiderman
          POSTGRES_PASSWORD: spiderman
          POSTGRES_DB: spiderman
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U spiderman"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://spiderman:spiderman@localhost:5432/spiderman
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-test-secret-key-not-for-prod-1234567890
      MASTER_LOCAL_API_KEY: ci-test-master-local-key
      ADMIN_PASSWORD: admin123
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install backend
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run alembic migrations
        working-directory: backend
        run: alembic upgrade head
      - name: Run pytest
        working-directory: backend
        run: pytest -q

  worker-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install worker
        working-directory: worker
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run pytest
        working-directory: worker
        run: pytest -q

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci --no-audit --no-fund
      - name: Type-check
        working-directory: frontend
        run: npx tsc --noEmit
      - name: Build
        working-directory: frontend
        run: npm run build
